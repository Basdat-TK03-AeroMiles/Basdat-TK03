{% extends 'base.html' %}

{% block content %}
<div class="flex-grow flex items-center justify-center p-6 bg-slate-50 relative overflow-hidden">
    
    <div class="absolute top-[-10%] left-[-5%] w-[500px] h-[500px] bg-cyan-400 rounded-full mix-blend-multiply filter blur-[128px] opacity-10"></div>
    <div class="absolute bottom-[-10%] right-[-5%] w-[500px] h-[500px] bg-blue-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-10"></div>

    <div class="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-md border border-slate-100 relative z-10">
        
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-slate-900 text-cyan-400 mb-5 shadow-lg shadow-slate-900/20 transform transition hover:scale-105">
                <i class="fa-solid fa-plane-arrival text-3xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Welcome Back</h1>
            <p class="text-slate-500 text-sm mt-2">Sign in to your AeroMiles portal</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="bg-rose-50 text-rose-600 p-4 rounded-xl text-sm mb-6 border border-rose-100 flex items-center shadow-sm">
                    <i class="fa-solid fa-circle-exclamation mr-3 text-lg"></i>{{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Email Address</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-regular fa-envelope text-slate-400"></i>
                        </div>
                        <input type="email" name="email" required class="w-full pl-11 pr-4 py-3.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition-all bg-slate-50 hover:bg-white text-sm" placeholder="email@aeromiles.com">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-lock text-slate-400"></i>
                        </div>
                        <input type="password" name="password" required class="w-full pl-11 pr-4 py-3.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition-all bg-slate-50 hover:bg-white text-sm" placeholder="••••••••">
                    </div>
                </div>
                
                <button type="submit" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-4 rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 mt-8 flex justify-center items-center group">
                    Secure Login 
                    <i class="fa-solid fa-arrow-right ml-2 group-hover:translate-x-1 transition-transform"></i>
                </button>
            </div>
        </form>

        <p class="text-center text-sm text-slate-500 mt-8">
            New to AeroMiles? <a href="#" class="text-cyan-600 font-bold hover:text-cyan-700 hover:underline transition-colors">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
