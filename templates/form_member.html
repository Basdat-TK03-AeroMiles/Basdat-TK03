{% extends 'base.html' %}

{% block content %}
<div class="flex-grow flex items-center justify-center p-6 bg-dsn relative overflow-hidden">
    <div class="bg-dsn/60 backdrop-blur-xl rounded-3xl shadow-2xl p-10 w-full max-w-2xl border border-white/10 relative z-10">
        
        <div class="mb-10">
            <h1 class="text-2xl font-extrabold text-white tracking-widest uppercase">Detail & Edit Member</h1>
            <p class="text-slate-400 text-sm mt-2 tracking-wider">Perbarui status atau tier member AeroMiles</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="space-y-6">
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[10px] font-bold text-electric uppercase tracking-widest mb-1">Nomor Member</label>
                        <p class="text-white font-mono text-lg">M0001</p>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-electric uppercase tracking-widest mb-1">Nama Member</label>
                        <p class="text-white text-lg">John William Doe</p>
                    </div>
                </div>

                <div class="border-t border-white/5 pt-6">
                    <label class="block text-xs font-bold text-slate-300 uppercase tracking-widest mb-3">Update Tier Status</label>
                    <select name="tier" class="w-full px-4 py-3 border border-white/10 rounded-xl focus:ring-1 focus:ring-electric focus:border-electric outline-none transition-all bg-white/5 text-sm text-white backdrop-blur-md appearance-none">
                        <option value="Blue">Blue (T01)</option>
                        <option value="Silver">Silver (T02)</option>
                        <option value="Gold">Gold (T03)</option>
                        <option value="Platinum">Platinum (T04)</option>
                    </select>
                </div>
            </div>

            <div class="flex gap-4 mt-12">
                <a href="{% url 'manajemen_member' %}" class="flex-1 text-center border border-white/10 text-slate-400 hover:text-white py-4 rounded-xl transition-all text-sm font-bold uppercase tracking-widest">Kembali</a>
                <button type="submit" class="flex-[2] bg-gradient-to-r from-electric/80 to-blue-600 hover:from-electric hover:to-blue-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-electric/30 transition-all text-sm uppercase tracking-widest">Update Data</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
