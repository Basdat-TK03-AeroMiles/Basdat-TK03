{% extends 'base.html' %}

{% block content %}
<div class="flex-grow flex items-center justify-center p-6 bg-dsn relative overflow-hidden">
    <div class="bg-dsn/60 backdrop-blur-xl rounded-3xl shadow-2xl p-10 w-full max-w-2xl border border-white/10 relative z-10">
        
        <div class="mb-10">
            <h1 class="text-2xl font-extrabold text-white tracking-widest uppercase">Form Identitas</h1>
            <p class="text-slate-400 text-sm mt-2 tracking-wider">Lengkapi detail dokumen perjalanan Anda di bawah ini</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-bold text-slate-300 uppercase tracking-widest mb-2">Jenis Identitas <span class="text-rose-500">*</span></label>
                    <select name="jenis" required class="w-full px-4 py-3 border border-white/10 rounded-xl focus:ring-1 focus:ring-electric focus:border-electric outline-none transition-all bg-white/5 text-sm text-white backdrop-blur-md appearance-none">
                        <option value="Paspor">Paspor</option>
                        <option value="KTP">KTP</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-300 uppercase tracking-widest mb-2">Nomor Identitas <span class="text-rose-500">*</span></label>
                    <input type="text" name="nomor" required class="w-full px-4 py-3 border border-white/10 rounded-xl focus:ring-1 focus:ring-electric focus:border-electric outline-none transition-all bg-white/5 text-sm text-white" placeholder="Contoh: P-1234567">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-300 uppercase tracking-widest mb-2">Negara Penerbit <span class="text-rose-500">*</span></label>
                    <input type="text" name="negara" required class="w-full px-4 py-3 border border-white/10 rounded-xl focus:ring-1 focus:ring-electric focus:border-electric outline-none transition-all bg-white/5 text-sm text-white" placeholder="Indonesia">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-300 uppercase tracking-widest mb-2">Tanggal Terbit <span class="text-rose-500">*</span></label>
                    <input type="date" name="tgl_terbit" required class="w-full px-4 py-3 border border-white/10 rounded-xl focus:ring-1 focus:ring-electric focus:border-electric outline-none transition-all bg-white/5 text-sm text-slate-300" style="color-scheme: dark;">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-300 uppercase tracking-widest mb-2">Tanggal Habis <span class="text-rose-500">*</span></label>
                    <input type="date" name="tgl_habis" required class="w-full px-4 py-3 border border-white/10 rounded-xl focus:ring-1 focus:ring-electric focus:border-electric outline-none transition-all bg-white/5 text-sm text-slate-300" style="color-scheme: dark;">
                </div>
            </div>

            <div class="flex gap-4 mt-10">
                <a href="{% url 'manajemen_identitas' %}" class="flex-1 text-center border border-white/10 text-slate-400 hover:text-white py-4 rounded-xl transition-all text-sm font-bold uppercase tracking-widest">Batal</a>
                <button type="submit" class="flex-[2] bg-gradient-to-r from-electric/80 to-blue-600 hover:from-electric hover:to-blue-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-electric/30 transition-all text-sm uppercase tracking-widest">Simpan Identitas</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
